name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # --no-frozen-lockfile: bun.lock can momentarily lag package.json when
        # dependencies are edited from environments that cannot run bun (e.g.
        # the agent sandbox). Bun otherwise auto-enables --frozen-lockfile on
        # CI and fails on the drift. Regenerate and commit bun.lock locally
        # when convenient to tighten this back up.
        run: bun install --no-frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint src --max-warnings 50

      - name: Test
        run: bunx vitest run
